name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential curl zip ncurses-bin
      - name: Run unit tests
        run: make test

  kobo-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure armhf apt sources
        run: |
          sudo dpkg --add-architecture armhf
          sudo awk '
            /^Architectures:/ { next }
            /^Types: deb$/ { print; print "Architectures: amd64"; next }
            { print }
          ' /etc/apt/sources.list.d/ubuntu.sources | sudo tee /etc/apt/sources.list.d/ubuntu.sources.new >/dev/null
          sudo mv /etc/apt/sources.list.d/ubuntu.sources.new /etc/apt/sources.list.d/ubuntu.sources
          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/ubuntu-armhf.sources
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe
          Architectures: armhf
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
      - name: Install cross build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential curl g++-arm-linux-gnueabihf \
            gcc-arm-linux-gnueabihf libncurses-dev:armhf libprotobuf-dev:armhf \
            libssl-dev:armhf libtool pkg-config protobuf-compiler zip zlib1g-dev:armhf
      - name: Build Kobo package
        env:
          CC: arm-linux-gnueabihf-gcc
          CXX: arm-linux-gnueabihf-g++
          STRIP: arm-linux-gnueabihf-strip
          PKG_CONFIG_LIBDIR: /usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
        run: make package TARGET=kobo
      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: koreader-mosh-kobo
          path: |
            dist/koreader-mosh-*.zip
            dist/koreader-mosh-*.zip.sha256
            dist/koreader-mosh-*.manifest.json
